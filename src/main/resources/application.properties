spring.application.name=helpdesk

# Dados de ConexŃo
#spring.datasource.url = jdbc:postgresql://localhost:5432/helpdesk?currentSchema=public
spring.datasource.url = jdbc:postgresql://localhost:5432/helpdesk
spring.datasource.username = postgres
spring.datasource.password = 123

spring.datasource.driver-class-name = org.postgresql.Driver

# Configurań§es JPA/Hibernate
spring.jpa.properties.hibernate.format_sql = true
spring.jpa.hibernate.ddl-auto = none
spring.jpa.show-sql = true
spring.jpa.hibernate.naming.implicit-strategy = org.hibernate.boot.model.naming.ImplicitNamingStrategyJpaCompliantImpl

# Dialeto Postgresql
spring.jpa.database-platform = org.hibernate.dialect.PostgreSQLDialect